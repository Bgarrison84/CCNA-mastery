<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CCNA Mastery — Gamified Learning</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="theme-color" content="#00ff41">

  <!-- Tailwind CSS — local copy for offline-first support (see sw.js) -->
  <script src="./css/tailwind.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace'] },
          colors: {
            terminal: { green: '#00ff41', amber: '#ffb000', dim: '#003b00' },
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'scan': 'scan 8s linear infinite',
          },
        },
      },
    };
  </script>

  <style>
    /* ── Base Terminal Aesthetic ─────────────────────────────── */
    :root {
      --terminal-green: #00ff41;
      --terminal-dim:   #003b00;
      --bg-primary:     #0a0a0a;
      --bg-surface:     #111111;
      --bg-elevated:    #1a1a1a;
    }

    * { box-sizing: border-box; }

    body {
      background-color: var(--bg-primary);
      color: #c8ffc8;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    }

    /* Scanline overlay — subtle CRT effect */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,65,0.015) 2px,
        rgba(0,255,65,0.015) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Scrollbar ────────────────────────────────────────────── */
    ::-webkit-scrollbar         { width: 4px; }
    ::-webkit-scrollbar-track   { background: #111; }
    ::-webkit-scrollbar-thumb   { background: #2d4a2d; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a7a4a; }

    /* ── Navigation ──────────────────────────────────────────── */
    .nav-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 10px 16px;
      border-left: 2px solid transparent;
      color: #4a7a4a;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.15s;
      background: transparent;
      cursor: pointer;
    }
    .nav-btn:hover {
      color: #00ff41;
      border-left-color: #00ff41;
      background: rgba(0,255,65,0.05);
    }
    .nav-active {
      color: #00ff41 !important;
      border-left-color: #00ff41 !important;
      background: rgba(0,255,65,0.08) !important;
    }

    /* ── XP Bar ──────────────────────────────────────────────── */
    #hud-xp-bar-track {
      background: rgba(0,255,65,0.1);
      border: 1px solid rgba(0,255,65,0.2);
    }
    #hud-xp-bar {
      background: linear-gradient(90deg, #00cc33, #00ff41);
      box-shadow: 0 0 8px rgba(0,255,65,0.6);
      transition: width 0.5s ease;
    }

    /* ── Terminal Cursor blink ───────────────────────────────── */
    #terminal-input::placeholder { color: #2a4a2a; }
    #terminal-input { caret-color: #00ff41; }

    /* ── Health Bars ─────────────────────────────────────────── */
    #player-hp-bar {
      background: linear-gradient(90deg, #16a34a, #4ade80);
      box-shadow: 0 0 6px rgba(74,222,128,0.4);
      transition: width 0.4s ease;
    }
    #boss-hp-bar {
      background: linear-gradient(90deg, #dc2626, #f87171);
      box-shadow: 0 0 6px rgba(248,113,113,0.4);
      transition: width 0.4s ease;
    }

    /* ── Toast Container ─────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 9998;
      pointer-events: none;
    }
    #toast-container > div {
      pointer-events: auto;
      min-width: 200px;
      max-width: 320px;
    }

    /* ── Inventory sidebar ───────────────────────────────────── */
    #sidebar-inventory {
      scrollbar-width: thin;
      scrollbar-color: #2d4a2d #111;
    }

    /* ── App layout fills viewport ───────────────────────────── */
    html, body { height: 100%; overflow: hidden; }
    #app-root   {
      display: flex;
      height: 100vh;
      height: 100dvh; /* dynamic viewport height — fixes iOS Safari address-bar clipping */
      overflow: hidden;
    }
    #app-view   { flex: 1; overflow-y: auto; }

    /* ── Glow effects ────────────────────────────────────────── */
    .glow-green { text-shadow: 0 0 8px rgba(0,255,65,0.8); }
    .glow-red   { text-shadow: 0 0 8px rgba(255,65,65,0.8); }

    /* ── Themes ──────────────────────────────────────────────── */

    /* Amber theme — unlocked at Level 5 */
    html[data-theme="amber"] {
      --terminal-green: #ffb000;
      --terminal-dim:   #3b2800;
    }
    html[data-theme="amber"] body { color: #ffe0a0; }
    html[data-theme="amber"] body::before {
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,176,0,0.018) 2px, rgba(255,176,0,0.018) 4px
      );
    }
    html[data-theme="amber"] .nav-btn:hover,
    html[data-theme="amber"] .nav-active {
      color: #ffb000 !important;
      border-left-color: #ffb000 !important;
    }
    html[data-theme="amber"] .nav-active {
      background: rgba(255,176,0,0.08) !important;
    }
    html[data-theme="amber"] .nav-btn:hover {
      background: rgba(255,176,0,0.05);
    }
    html[data-theme="amber"] #hud-xp-bar {
      background: linear-gradient(90deg, #cc8800, #ffb000);
      box-shadow: 0 0 8px rgba(255,176,0,0.6);
    }
    html[data-theme="amber"] #hud-xp-bar-track {
      background: rgba(255,176,0,0.1);
      border-color: rgba(255,176,0,0.2);
    }
    html[data-theme="amber"] .glow-green {
      text-shadow: 0 0 8px rgba(255,176,0,0.8);
    }
    html[data-theme="amber"] ::-webkit-scrollbar-thumb { background: #4a3200; }

    /* Blue/Cyan theme — unlocked at Level 8 */
    html[data-theme="blue"] {
      --terminal-green: #00bfff;
      --terminal-dim:   #001a3b;
    }
    html[data-theme="blue"] body { color: #a0e0ff; }
    html[data-theme="blue"] body::before {
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,191,255,0.018) 2px, rgba(0,191,255,0.018) 4px
      );
    }
    html[data-theme="blue"] .nav-btn:hover,
    html[data-theme="blue"] .nav-active {
      color: #00bfff !important;
      border-left-color: #00bfff !important;
    }
    html[data-theme="blue"] .nav-active {
      background: rgba(0,191,255,0.08) !important;
    }
    html[data-theme="blue"] .nav-btn:hover {
      background: rgba(0,191,255,0.05);
    }
    html[data-theme="blue"] #hud-xp-bar {
      background: linear-gradient(90deg, #0080cc, #00bfff);
      box-shadow: 0 0 8px rgba(0,191,255,0.6);
    }
    html[data-theme="blue"] #hud-xp-bar-track {
      background: rgba(0,191,255,0.1);
      border-color: rgba(0,191,255,0.2);
    }
    html[data-theme="blue"] .glow-green {
      text-shadow: 0 0 8px rgba(0,191,255,0.8);
    }
    html[data-theme="blue"] ::-webkit-scrollbar-thumb { background: #00264d; }

    /* Theme swatch button */
    .theme-swatch {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
    }
    .theme-swatch:hover:not(.locked) { transform: scale(1.2); }
    .theme-swatch.active { border-color: white !important; }
    .theme-swatch.locked { cursor: not-allowed; opacity: 0.4; }

    /* ── Micro-animations ────────────────────────────────────── */

    /* Floating +XP label */
    @keyframes floatXP {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 1; transform: translateY(-30px) scale(1.15); }
      100% { opacity: 0; transform: translateY(-54px) scale(0.9); }
    }
    .float-xp {
      position: fixed;
      pointer-events: none;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      font-size: 0.88rem;
      font-weight: 700;
      color: #00ff41;
      text-shadow: 0 0 8px rgba(0,255,65,0.9);
      z-index: 9997;
      animation: floatXP 1.1s ease-out forwards;
    }

    /* Wrong answer shake */
    @keyframes shakeWrong {
      0%,100% { transform: translateX(0); }
      15%     { transform: translateX(-7px); }
      30%     { transform: translateX(7px); }
      45%     { transform: translateX(-5px); }
      60%     { transform: translateX(5px); }
      75%     { transform: translateX(-3px); }
      90%     { transform: translateX(3px); }
    }
    .answer-shake { animation: shakeWrong 0.45s ease forwards; }

    /* Correct answer flash */
    @keyframes flashCorrect {
      0%   { border-color: #00ff41 !important;
             box-shadow: 0 0 0 2px rgba(0,255,65,0.45);
             background: rgba(0,255,65,0.12) !important; }
      100% { border-color: #4b5563;
             box-shadow: none;
             background: transparent; }
    }
    .answer-flash-correct { animation: flashCorrect 0.55s ease forwards; }

    /* Boss HP bar damage pulse */
    @keyframes hpDamageFlash {
      0%,100% { box-shadow: none; }
      35%     { box-shadow: 0 0 18px rgba(255,50,50,0.95), 0 0 36px rgba(255,50,50,0.4); }
    }
    .hp-damage-flash { animation: hpDamageFlash 0.55s ease forwards; }

    /* XP bar level-up glow */
    @keyframes xpLevelGlow {
      0%,100% { box-shadow: 0 0 8px rgba(0,255,65,0.6); }
      40%     { box-shadow: 0 0 28px rgba(255,215,0,0.95), 0 0 56px rgba(255,215,0,0.35); }
      70%     { box-shadow: 0 0 18px rgba(255,215,0,0.55); }
    }
    .xp-level-pulse { animation: xpLevelGlow 0.85s ease forwards; }

    /* Quiz option card hover */
    .quiz-option {
      transition: transform 0.1s ease, box-shadow 0.12s ease;
    }
    .quiz-option:not(:disabled):hover {
      transform: scale(1.006);
      box-shadow: 0 0 14px rgba(0,255,65,0.13);
    }

    /* ── Lab view full height ────────────────────────────────── */
    #app-view > div[style*="height"],
    #app-view .flex.h-full {
      height: 100%;
    }

    /* ── Mobile layout ───────────────────────────────────────── */
    @media (max-width: 767px) {
      /* Hide sidebar; content fills full width */
      #app-sidebar { display: none; }
      /* Reserve space for bottom nav + device safe area */
      #app-view    { padding-bottom: calc(56px + env(safe-area-inset-bottom)); }
      /* Bottom nav visible */
      #bottom-nav  { display: flex; }
      /* Show hamburger button in top bar */
      #mobile-menu-btn { display: flex !important; }
      /* Ensure lab view doesn't break on narrow screens */
      #app-view .flex.h-full { flex-direction: column; height: auto; min-height: 100%; }
      #app-view .flex.h-full > .w-64 { width: 100%; max-height: 160px; overflow-y: auto; flex-shrink: 0; }
      /* 44px min tap targets on quiz/exam option buttons */
      .quiz-option, .exam-option { min-height: 44px !important; }
      /* Nav buttons: already ~40px; nudge to 44px */
      .nav-btn { min-height: 44px; }
      /* Move toast above bottom nav + safe area */
      #toast-container { bottom: calc(72px + env(safe-area-inset-bottom)); }
    }

    /* ── Mobile Drawer ───────────────────────────────────────── */
    #mobile-drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    #mobile-drawer-overlay.open { display: block; }

    #mobile-drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: min(85vw, 300px);
      background: #0d0d0d;
      border-right: 1px solid rgba(0,255,65,0.25);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
    }
    #mobile-drawer.open { transform: translateX(0); }

    #mobile-drawer .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(0,255,65,0.15);
      flex-shrink: 0;
    }
    #mobile-drawer .drawer-nav-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 13px 16px;
      border: none; background: transparent;
      border-left: 2px solid transparent;
      color: #4a7a4a;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.12s;
      text-align: left;
    }
    #mobile-drawer .drawer-nav-btn:hover,
    #mobile-drawer .drawer-nav-btn:active {
      color: #00ff41;
      border-left-color: #00ff41;
      background: rgba(0,255,65,0.06);
    }
    #mobile-drawer .drawer-nav-btn.nav-active {
      color: #00ff41 !important;
      border-left-color: #00ff41 !important;
      background: rgba(0,255,65,0.09) !important;
    }
    #mobile-drawer .drawer-section-label {
      padding: 8px 16px 4px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #2a4a2a;
      border-top: 1px solid rgba(0,255,65,0.08);
      margin-top: 4px;
    }

    /* Player HUD inside drawer */
    #drawer-hud {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0,255,65,0.15);
      flex-shrink: 0;
    }

    /* Bottom nav — hidden on desktop */
    #bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(56px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: #0d0d0d;
      border-top: 1px solid rgba(0,255,65,0.2);
      z-index: 100;
      align-items: stretch;
    }
    .bottom-nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: transparent;
      border: none;
      color: #4a7a4a;
      font-size: 9px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      padding: 4px 2px;
    }
    .bottom-nav-btn:hover   { color: #00ff41; background: rgba(0,255,65,0.05); }
    .bottom-nav-btn.nav-active { color: #00ff41 !important; background: rgba(0,255,65,0.08) !important; }
    .bottom-nav-btn span.icon { font-size: 18px; line-height: 1; }

    /* Drag sort items — prevent text select during drag */
    .drag-item { user-select: none; -webkit-user-select: none; }
  </style>
</head>

<body class="bg-[#0a0a0a] text-green-300">

<!-- ── Root Layout ──────────────────────────────────────────────────────────── -->
<div id="app-root">

  <!-- ── Sidebar ────────────────────────────────────────────────────────────── -->
  <aside id="app-sidebar" class="w-56 shrink-0 flex flex-col bg-[#0d0d0d] border-r border-green-900/40">

    <!-- Logo -->
    <div class="px-4 py-5 border-b border-green-900/40">
      <div class="text-green-400 font-bold text-base tracking-widest glow-green">CCNA</div>
      <div class="text-green-600 text-xs tracking-widest">MASTERY v1.0</div>
      <div class="mt-2 text-[10px] text-green-900 font-mono">OFFLINE · NO BACKEND</div>
    </div>

    <!-- Player HUD -->
    <div class="px-4 py-3 border-b border-green-900/40 space-y-2">
      <div class="flex items-center justify-between">
        <span id="hud-player-name" class="text-green-300 text-xs font-semibold truncate">Network Cadet</span>
        <span id="hud-level" class="text-yellow-400 text-xs font-bold border border-yellow-700 rounded px-1.5 py-0.5">LVL 1</span>
      </div>
      <!-- XP Bar -->
      <div id="hud-xp-bar-track" class="w-full rounded-full h-1.5 overflow-hidden">
        <div id="hud-xp-bar" class="h-full rounded-full" style="width:0%" aria-valuenow="0" role="progressbar"></div>
      </div>
      <div id="hud-xp-text" class="text-[10px] text-green-700">0 XP</div>
      <div class="flex items-center justify-between text-[10px]">
        <span id="hud-week" class="text-cyan-600">Week 1</span>
        <span class="text-yellow-600">&#9670; <span id="hud-hints">3</span> hints</span>
      </div>
      <div class="flex items-center justify-between text-[10px]">
        <span id="hud-streak" class="text-orange-500">&#128293; <span id="hud-streak-count">0</span> day streak</span>
        <span id="hud-multiplier" class="hidden text-yellow-400 font-bold">x<span id="hud-mult-val">1</span></span>
      </div>
      <!-- Pomodoro Timer -->
      <div class="flex items-center justify-between text-[10px]">
        <button id="hud-pomodoro-btn" title="Start a 25-minute Pomodoro focus session" class="flex items-center gap-1 text-red-400 hover:text-red-300 transition-colors cursor-pointer select-none">
          <span>&#127813;</span> <span id="hud-pomodoro-label">Pomodoro</span>
        </button>
        <span id="hud-pomodoro-count" class="text-gray-600">&#127813; <span id="hud-pomodoro-total">0</span></span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-2">
      <button data-nav="story"     class="nav-btn" title="Story Mode — 6-week narrative campaign that teaches every CCNA topic in context">
        <span>&#128218;</span> Story Mode
      </button>
      <button data-nav="lab"       class="nav-btn" title="The Lab — 33 CLI terminal simulation labs with real Cisco IOS command validation">
        <span>&#128187;</span> The Lab
      </button>
      <button data-nav="grind"     class="nav-btn" title="The Grind — 4,186 quiz questions with spaced repetition, domain filtering, and re-queue">
        <span>&#128260;</span> The Grind
      </button>
      <button data-nav="exam"      class="nav-btn" title="Exam Sim — 120 questions, 120 minutes, real CCNA domain weighting with per-domain scoring">
        <span>&#128196;</span> Exam Sim
      </button>
      <button data-nav="stats"     class="nav-btn" title="Stats — Readiness score, radar chart, heatmap, study planner, quiz and exam history">
        <span>&#128202;</span> Stats
      </button>
      <button data-nav="boss"      class="nav-btn" title="Boss Battles — End-of-week combat encounters; answer questions to deal damage">
        <span>&#128128;</span> Boss Battles
      </button>
      <button data-nav="subnet"    class="nav-btn" title="Subnetting — Rapid-fire drill; calculate network ID, broadcast, and host range under time pressure">
        <span>&#127760;</span> Subnetting
      </button>
      <button data-nav="flash"     class="nav-btn" title="Flashcards — 3D-flip cards with swipe gestures; self-rate to feed the SRS scheduler">
        <span>&#9889;</span> Flashcards
      </button>
      <button data-nav="reference" class="nav-btn" title="Reference — Offline cheat-sheet: ports, OSI, STP, OSPF LSAs, IPv6, HSRP, AAA, CLI quick-ref">
        <span>&#128218;</span> Reference
      </button>
      <button data-nav="notebook"  class="nav-btn" title="Notebook — Flagged questions and mistake tracker; drill your weak spots directly">
        <span>&#128214;</span> Notebook
      </button>
      <button data-nav="projects" class="nav-btn" title="Projects — 8 guided multi-phase projects combining CLI labs and quiz checkpoints">
        <span>&#128295;</span> Projects
      </button>
      <button data-nav="megalabs" class="nav-btn" title="Mega Labs — 5 expert-level multi-phase enterprise scenario labs; earn unique badges">
        <span>&#127981;</span> Mega Labs
      </button>
      <button data-nav="scripting" class="nav-btn" title="Scripting — 10 network automation labs: Netmiko, Ansible, Bash, RESTCONF — write real scripts, get instant feedback">
        <span>&#9000;</span> Scripting
      </button>
      <button data-nav="inventory" class="nav-btn" title="Inventory — Items and achievements unlocked through gameplay (each item has a passive effect)">
        <span>&#127775;</span> Inventory
      </button>
    </nav>

    <!-- Theme picker -->
    <div id="theme-picker-bar" class="px-4 py-2 border-t border-green-900/40 flex items-center gap-3">
      <span class="text-[10px] text-green-900 uppercase tracking-widest flex-shrink-0">Theme</span>
      <div class="flex items-center gap-2" id="theme-swatches">
        <button class="theme-swatch active" data-theme-id="terminal-green"
          style="background:#00ff41;" title="Terminal Green (default)"></button>
        <button class="theme-swatch locked" data-theme-id="amber"
          style="background:#ffb000;" title="Amber — unlocks at Level 5" id="swatch-amber">
          <span class="lock-icon">🔒</span></button>
        <button class="theme-swatch locked" data-theme-id="blue"
          style="background:#00bfff;" title="Cyan — unlocks at Level 8" id="swatch-blue">
          <span class="lock-icon">🔒</span></button>
      </div>
    </div>

    <!-- Sidebar Inventory (compact) -->
    <div class="px-4 py-3 border-t border-green-900/40 max-h-40 overflow-y-auto" id="sidebar-inventory">
      <div class="text-[10px] text-green-900 uppercase tracking-widest mb-1">Items</div>
      <ul id="inventory-list" class="space-y-0.5 text-xs">
        <li class="text-gray-700 italic">No items yet.</li>
      </ul>
    </div>
  </aside>

  <!-- ── Main Content ────────────────────────────────────────────────────────── -->
  <main class="flex flex-col flex-1 overflow-hidden">

    <!-- Top bar -->
    <header class="shrink-0 flex items-center justify-between px-4 py-2 border-b border-green-900/40 bg-[#0d0d0d]">
      <div class="flex items-center gap-2 text-xs text-green-700">
        <!-- Hamburger — mobile only -->
        <button id="mobile-menu-btn" title="Open navigation menu"
          style="display:none"
          class="mr-1 flex flex-col justify-center items-center gap-1 w-9 h-9 rounded border border-green-900/40 hover:border-green-700 hover:bg-green-900/20 transition-colors shrink-0">
          <span class="w-4 h-0.5 bg-green-500 rounded"></span>
          <span class="w-4 h-0.5 bg-green-500 rounded"></span>

<!-- ── Mobile Drawer Logic ───────────────────────────────────────────────────── -->
<script>
(function () {
  const drawer    = document.getElementById('mobile-drawer');
  const overlay   = document.getElementById('mobile-drawer-overlay');
  const openBtns  = [
    document.getElementById('mobile-menu-btn'),
    document.getElementById('bottom-nav-more-btn'),
  ];
  const closeBtn  = document.getElementById('mobile-drawer-close');

  function openDrawer() {
    drawer.classList.add('open');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    // Sync mini-HUD from sidebar values
    const syncText = (drawerEl, sidebarId) => {
      const src = document.getElementById(sidebarId);
      if (src && drawerEl) drawerEl.textContent = src.textContent;
    };
    syncText(document.getElementById('drawer-player-name'), 'hud-player-name');
    syncText(document.getElementById('drawer-level'),       'hud-level');
    syncText(document.getElementById('drawer-xp-text'),    'hud-xp-text');
    const xpBar = document.getElementById('hud-xp-bar');
    const dxp   = document.getElementById('drawer-xp-bar');
    if (xpBar && dxp) dxp.style.width = xpBar.style.width;
    // Sync active nav state
    const activeNav = document.querySelector('[data-nav].nav-active, [data-nav].bottom-nav-btn.nav-active');
    const activeView = activeNav ? activeNav.dataset.nav : null;
    drawer.querySelectorAll('.drawer-nav-btn').forEach(btn => {
      btn.classList.toggle('nav-active', activeView && btn.dataset.nav === activeView);
    });
    // Sync theme swatches
    const activeTheme = document.querySelector('.theme-swatch.active');
    if (activeTheme) {
      const tid = activeTheme.dataset.themeId;
      drawer.querySelectorAll('.theme-swatch').forEach(s => {
        s.classList.toggle('active', s.dataset.themeId === tid);
      });
    }
    // Focus the close button for keyboard accessibility
    setTimeout(() => closeBtn.focus(), 50);
  }

  function closeDrawer() {
    drawer.classList.remove('open');
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  openBtns.forEach(btn => btn && btn.addEventListener('click', openDrawer));
  closeBtn.addEventListener('click', closeDrawer);
  overlay.addEventListener('click', closeDrawer);

  // Close on Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
  });

  // Drawer nav buttons — call switchView directly (exposed on window by main.js)
  drawer.querySelectorAll('.drawer-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      closeDrawer();
      // Small delay so drawer close animation doesn't fight with view render
      setTimeout(() => {
        if (window.switchView) {
          window.switchView(btn.dataset.nav);
        }
      }, 60);
    });
  });

  // Theme swatches in drawer — delegate to sidebar swatches
  drawer.querySelectorAll('.theme-swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
      const match = document.querySelector(`#app-sidebar .theme-swatch[data-theme-id="${swatch.dataset.themeId}"]`);
      if (match) match.click();
      // Update active state in drawer
      drawer.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
    });
  });

  // Keep drawer lock states in sync with sidebar swatches
  const observer = new MutationObserver(() => {
    ['amber', 'blue'].forEach(theme => {
      const src  = document.getElementById(`swatch-${theme}`);
      const dest = document.getElementById(`drawer-swatch-${theme}`);
      if (!src || !dest) return;
      const locked = src.classList.contains('locked');
      dest.classList.toggle('locked', locked);
      dest.style.cursor = locked ? 'not-allowed' : 'pointer';
      const lockIcon = dest.querySelector('.lock-icon');
      if (lockIcon) lockIcon.style.display = locked ? '' : 'none';
    });
  });
  ['swatch-amber', 'swatch-blue'].forEach(id => {
    const el = document.getElementById(id);
    if (el) observer.observe(el, { attributes: true, attributeFilter: ['class'] });
  });

  // Expose openDrawer globally so main.js can call it if needed
  window.openMobileDrawer  = openDrawer;
  window.closeMobileDrawer = closeDrawer;
})();
</script>

<!-- ── Service Worker Registration ──────────────────────────────────────────── -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => {
          // Notify main.js when a new service worker is waiting
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker?.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[SW] Update available — reload to apply.');
              }
            });
          });
        })
        .catch(err => console.warn('[SW] Registration failed:', err));
    });
  }
</script>
